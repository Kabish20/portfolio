services:
  - type: web
    name: portfolio
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn portfolio.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: ALLOWED_HOSTS
        value: "portfolio-kabish-m-e.onrender.com"
